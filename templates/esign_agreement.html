<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Соглашение об использовании электронной подписи</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f6f7fb; margin: 0; }
        .container { max-width: 960px; margin: 24px auto; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        .header { color: #555; margin-bottom: 16px; font-size: 14px; }
        .content { border: 1px solid #ddd; border-radius: 8px; padding: 24px; background: #fff; line-height: 1.6; }
        .content h1 { font-size: 20px; }
        .content h2 { font-size: 16px; margin-top: 24px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">{{ tenant_name }}</div>
    <div class="content">{{ html_body|safe }}</div>
</div>
</body>
</html>

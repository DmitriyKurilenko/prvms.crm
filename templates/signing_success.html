<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Документ подписан</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f6f7fb; margin: 0; }
        .container { max-width: 600px; margin: 80px auto; background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); text-align: center; }
        .icon { font-size: 64px; margin-bottom: 16px; }
        h1 { color: #166534; margin-bottom: 8px; }
        .meta { color: #555; margin-bottom: 24px; font-size: 15px; }
        .details { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 16px; text-align: left; color: #166534; }
        .details dt { font-weight: 600; margin-top: 8px; }
        .details dd { margin: 0 0 4px 0; }
        .actions { margin-top: 24px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: 0; border-radius: 8px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: #0c7d2d; color: #fff; }
        .btn-primary:hover { background: #0a6b25; }
        .btn-outline { background: #fff; color: #333; border: 1px solid #ccc; }
        .btn-outline:hover { background: #f5f5f5; }
        .email-section { margin-top: 20px; text-align: center; }
        .email-row { display: flex; gap: 8px; justify-content: center; align-items: center; margin-top: 8px; }
        .email-row input { padding: 8px 12px; border: 1px solid #bbb; border-radius: 8px; font-size: 14px; min-width: 200px; }
        .email-row button { padding: 8px 16px; }
        .email-result { margin-top: 8px; font-size: 13px; }
        .email-ok { color: #166534; }
        .email-err { color: #991b1b; }
    </style>
</head>
<body>
<div class="container">
    <div class="icon">✅</div>
    <h1>Документ успешно подписан</h1>
    <p class="meta">Документ #{{ document_id }} подписан электронной подписью.</p>
    <div class="details">
        <dl>
            <dt>Номер документа</dt>
            <dd>#{{ document_id }}</dd>
            <dt>Дата подписания</dt>
            <dd>{{ signed_at|date:"d.m.Y H:i" }}</dd>
        </dl>
    </div>

    <div class="actions">
        <a href="/sign/{{ token }}/download/" class="btn btn-primary">📥 Скачать подписанный PDF</a>
    </div>

    <div class="email-section">
        <p style="color: #555; font-size: 14px;">Или отправьте копию на email:</p>
        <div class="email-row">
            <input type="email" id="email-input" placeholder="client@example.com" />
            <button class="btn btn-outline" onclick="sendEmail()">Отправить</button>
        </div>
        <div id="email-result" class="email-result"></div>
    </div>

    <p style="color: #888; font-size: 13px; margin-top: 24px;">Подписанный документ содержит блок электронной подписи.</p>
</div>
<script>
function sendEmail() {
    var email = document.getElementById('email-input').value.trim();
    var result = document.getElementById('email-result');
    if (!email || email.indexOf('@') === -1) {
        result.className = 'email-result email-err';
        result.textContent = 'Введите корректный email';
        return;
    }
    result.className = 'email-result';
    result.textContent = 'Отправка...';

    fetch('/sign/{{ token }}/send-email/', {
        method: 'POST',
        headers: {
            'X-CSRFToken': getCookie('csrftoken'),
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({email: email})
    })
    .then(function(resp) { return resp.json().then(function(d) { return {ok: resp.ok, data: d}; }); })
    .then(function(r) {
        if (r.ok) {
            result.className = 'email-result email-ok';
            result.textContent = '✓ Отправлено на ' + email;
        } else {
            result.className = 'email-result email-err';
            result.textContent = r.data.error || 'Ошибка отправки';
        }
    })
    .catch(function() {
        result.className = 'email-result email-err';
        result.textContent = 'Ошибка сети';
    });
}
function getCookie(name) {
    var v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
    return v ? v.pop() : '';
}
</script>
</body>
</html>

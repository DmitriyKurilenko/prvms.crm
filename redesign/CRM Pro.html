<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Pro</title>
<style>
/* Sakai-inspired CRM Design Tokens & Global Styles */
@import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&display=swap');

:root {
  --primary: #4F46E5;
  --primary-light: #818CF8;
  --primary-lighter: #E0E7FF;
  --primary-dark: #3730A3;
  --surface-ground: #F8F9FA;
  --surface-section: #FFFFFF;
  --surface-card: #FFFFFF;
  --surface-overlay: #FFFFFF;
  --surface-border: #E5E7EB;
  --surface-hover: #F3F4F6;
  --text-color: #1F2937;
  --text-color-secondary: #6B7280;
  --text-color-muted: #9CA3AF;
  --green-500: #22C55E;
  --green-50: #F0FDF4;
  --red-500: #EF4444;
  --red-50: #FEF2F2;
  --orange-500: #F97316;
  --orange-50: #FFF7ED;
  --blue-500: #3B82F6;
  --blue-50: #EFF6FF;
  --yellow-500: #EAB308;
  --sidebar-width: 260px;
  --sidebar-collapsed-width: 72px;
  --topbar-height: 60px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
  --font-family: 'Nunito Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}

[data-theme="dark"] {
  --primary-lighter: rgba(129, 140, 248, 0.18);
  --surface-ground: #0F172A;
  --surface-section: #1E293B;
  --surface-card: #1E293B;
  --surface-overlay: #1E293B;
  --surface-border: #334155;
  --surface-hover: #334155;
  --text-color: #F1F5F9;
  --text-color-secondary: #CBD5E1;
  --text-color-muted: #94A3B8;
  --green-50: rgba(34,197,94,0.15);
  --red-50: rgba(239,68,68,0.15);
  --orange-50: rgba(249,115,22,0.15);
  --blue-50: rgba(59,130,246,0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-family); background: var(--surface-ground); color: var(--text-color); -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }

/* Mobile: hide sidebar by default, show overlay when open */
.mobile-menu-btn { display: none; }
.mobile-overlay { display: none; }

@media (max-width: 900px) {
  :root { --sidebar-width: 0px; }
  .crm-sidebar { transform: translateX(-100%); width: 260px !important; box-shadow: var(--shadow-lg); }
  .crm-sidebar.open { transform: translateX(0); }
  .crm-topbar { left: 0 !important; padding: 0 16px !important; }
  .crm-topbar .topbar-search { display: none !important; }
  .crm-main { margin-left: 0 !important; padding: 14px 14px !important; }
  .mobile-menu-btn { display: flex !important; }
  .mobile-overlay { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; }
  /* Stack grids and tables */
  .responsive-grid-3, .responsive-grid-4, .responsive-grid-2 { grid-template-columns: 1fr !important; }
  .responsive-grid-stack-md { grid-template-columns: 1fr !important; }
  /* Kanban: horizontal scroll already enabled, just shrink columns */
  /* Tables: allow horizontal scroll */
  .responsive-table-wrap { overflow-x: auto; }
}

@media (max-width: 600px) {
  .responsive-grid-3, .responsive-grid-4 { grid-template-columns: 1fr !important; }
  .topbar-actions-extra { display: none !important; }
}

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
.animate-fade { animation: fadeIn 0.3s ease forwards; opacity: 0; }
.animate-slide-right { animation: slideInRight 0.3s ease; }
.animate-slide-up { animation: slideInUp 0.4s ease; }
.animate-scale { animation: scaleIn 0.2s ease; }

</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

</head>

const menuItems = [

  { id: 'contacts', icon: 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z', label: 'Контакты' },
  { id: 'companies', icon: 'M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4', label: 'Компании' },

  { id: 'finance', icon: 'M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z', label: 'Финансы' },
  { id: 'reports', icon: 'M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z', label: 'Отчёты' },
  { type: 'divider' },
  { id: 'phone', icon: 'M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z', label: 'Телефония' },

];

const SvgIcon = ({ d, size = 20 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">

);

const sidebarStyles = {
  sidebar: {
    position: 'fixed', top: 0, left: 0, bottom: 0,
    width: 'var(--sidebar-width)',
    background: 'var(--surface-card, #FFFFFF)',
    borderRight: '1px solid var(--surface-border)',
    display: 'flex', flexDirection: 'column',
    zIndex: 100,
    transition: 'transform 0.3s ease',
  },
  logo: {
    height: 'var(--topbar-height)',
    display: 'flex', alignItems: 'center', gap: 10,

    fontWeight: 700, fontSize: 20, color: 'var(--primary)',

  logoIcon: {

    color: '#fff', fontWeight: 700, fontSize: 14,
  },
};

function Sidebar({ currentPage, onNavigate, mobileOpen, onClose }) {
  const [hoveredItem, setHoveredItem] = React.useState(null);

  return (
    <aside className={'crm-sidebar' + (mobileOpen ? ' open' : '')} style={sidebarStyles.sidebar}>
      <div style={sidebarStyles.logo}>
        <div style={sidebarStyles.logoIcon}>CR</div>
        <span>CRM Pro</span>
      </div>
      <nav style={sidebarStyles.nav}>
        {menuItems.map((item, i) => {
          if (item.type === 'divider') return <div key={i} style={sidebarStyles.divider} />;
          const active = currentPage === item.id;
          const hovered = hoveredItem === item.id && !active;
          return (
            <div
              key={item.id}
              style={{
                ...sidebarStyles.item(active),
                ...(hovered ? { background: 'var(--surface-hover)', color: 'var(--text-color)' } : {}),
              }}
              onClick={() => onNavigate(item.id)}
              onMouseEnter={() => setHoveredItem(item.id)}
              onMouseLeave={() => setHoveredItem(null)}
            >
              <SvgIcon d={item.icon} />
              <span>{item.label}</span>
              {item.badge && <span style={sidebarStyles.badge}>{item.badge}</span>}
            </div>
          );
        })}
      </nav>
      <div style={sidebarStyles.userArea}>
        <div style={sidebarStyles.avatar}>АИ</div>

          <div style={{ fontSize: 11, color: 'var(--text-color-muted)' }}>Менеджер</div>
        </div>
      </div>
    </aside>
  );
}

            onMouseLeave={() => setHoveredBtn(null)}

            <SvgIcon d={
              btn === 'bell' ? 'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9' :

            <div onClick={onCloseQuickAdd} style={{position:'fixed',inset:0,zIndex:200}}/>

                  <div style={{width:32,height:32,borderRadius:8,background:bg,color:c,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><SvgIcon d={d} size={16}/></div>

                </button>
              ))}
            </div>
          </>)}
        </div>
      </div>
    </header>

}

window.Topbar = Topbar;
window.pageNames = pageNames;


/* Dashboard Screen */
const dashStyles = {
  grid: { display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 20, marginBottom: 24 },

function DealsScreen() {
  const [hoveredCard, setHoveredCard] = React.useState(null);
  const [stages, setStages] = React.useState(dealStages);
  const [selectedDeal, setSelectedDeal] = React.useState(null);
  const [selectedStage, setSelectedStage] = React.useState(null);
  const [draggedDeal, setDraggedDeal] = React.useState(null);
  const [dragOverStage, setDragOverStage] = React.useState(null);

  const moveDeal = (dealId, fromStageId, toStageId) => {
    if (fromStageId === toStageId) return;
    setStages(prev => {
      let movingDeal = null;
      const next = prev.map(s => {
        if (s.id === fromStageId) {
          const deal = s.deals.find(d => d.id === dealId);
          if (deal) movingDeal = deal;
          return { ...s, deals: s.deals.filter(d => d.id !== dealId) };
        }
        return s;
      });
      if (!movingDeal) return prev;
      return next.map(s => s.id === toStageId ? { ...s, deals: [...s.deals, movingDeal] } : s);
    });
  };

  const totalAmount = stages.reduce((sum, s) => {
    return sum + s.deals.reduce((ds, d) => {
      const num = parseFloat(d.amount.replace(/[^\d.]/g, ''));
      const mult = d.amount.includes('M') ? 1000 : 1;
      return ds + num * mult;
    }, 0);
  }, 0);

  return (
    <div className="animate-fade">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
        <div>
          <h1 style={{ fontSize: 24, fontWeight: 700, marginBottom: 4 }}>Сделки</h1>
          <p style={{ fontSize: 14, color: 'var(--text-color-secondary)' }}>
            {stages.reduce((s, st) => s + st.deals.length, 0)} сделок в воронке
          </p>
        </div>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <div style={{
            padding: '8px 16px', borderRadius: 8, background: 'var(--primary-lighter)',
            fontSize: 13, fontWeight: 700, color: 'var(--primary)',
          }}>
            Итого: ₽ {(totalAmount / 1000).toFixed(1)}M
          </div>
          <button style={{
            padding: '9px 18px', borderRadius: 8, border: 'none',
            background: 'var(--primary)', color: '#fff', fontSize: 13, fontWeight: 600,
            cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, fontFamily: 'inherit',
          }} onClick={()=>window.openCreate&&window.openCreate('deal')}><SvgIcon d="M12 4v16m8-8H4" size={15} />Новая сделка</button>
        </div>
      </div>

      <div style={kanbanStyles.board}>
        {stages.map(stage => {
          const stageSum = stage.deals.reduce((s, d) => {
            const num = parseFloat(d.amount.replace(/[^\d.]/g, ''));
            const mult = d.amount.includes('M') ? 1000 : 1;
            return s + num * mult;
          }, 0);
          return (
            <div key={stage.id} style={{...kanbanStyles.column, ...(dragOverStage===stage.id ? {background:'var(--primary-lighter)',borderRadius:'var(--radius-md)',outline:'2px dashed var(--primary)'} : {})}}
              onDragOver={e => { e.preventDefault(); setDragOverStage(stage.id); }}
              onDragLeave={e => { if (e.currentTarget.contains(e.relatedTarget)) return; setDragOverStage(null); }}
              onDrop={e => { e.preventDefault(); if (draggedDeal) moveDeal(draggedDeal.id, draggedDeal.fromStage, stage.id); setDraggedDeal(null); setDragOverStage(null); }}>
              <div style={kanbanStyles.colHeader(stage.color)}>
                <div style={kanbanStyles.colTitle(stage.color)}>
                  <div style={kanbanStyles.colDot(stage.color)} />
                  {stage.name}
                  <span style={kanbanStyles.colCount}>{stage.deals.length}</span>
                </div>
                <span style={kanbanStyles.colTotal(stage.color)}>₽ {stageSum >= 1000 ? (stageSum/1000).toFixed(1) + 'M' : stageSum + 'K'}</span>
              </div>
              <div style={{ flex: 1 }}>
                {stage.deals.map(deal => (
                  <div key={deal.id}
                    draggable
                    onDragStart={e => { setDraggedDeal({ id: deal.id, fromStage: stage.id }); e.dataTransfer.effectAllowed = 'move'; }}
                    onDragEnd={() => { setDraggedDeal(null); setDragOverStage(null); }}
                    style={{...kanbanStyles.card(hoveredCard === deal.id), opacity: draggedDeal?.id === deal.id ? 0.4 : 1}}
                    onMouseEnter={() => setHoveredCard(deal.id)}
                    onMouseLeave={() => setHoveredCard(null)}
                    onClick={() => { setSelectedDeal(deal); setSelectedStage(stage); }}
                  >
                    <div style={kanbanStyles.cardName}>{deal.name}</div>
                    <div style={kanbanStyles.cardCompany}>{deal.company} · {deal.contact}</div>
                    <div style={kanbanStyles.cardBottom}>
                      <span style={kanbanStyles.cardAmount}>{deal.amount}</span>
                      <div style={kanbanStyles.cardMeta}>
                        <div style={kanbanStyles.priorityDot(deal.priority)} />
                        <span>{deal.days}д</span>
                      </div>
                    </div>
                  </div>
                ))}
                <button
                  style={kanbanStyles.addBtn}
                  onMouseEnter={e => { e.target.style.borderColor = 'var(--primary-light)'; e.target.style.color = 'var(--primary)'; }}
                  onMouseLeave={e => { e.target.style.borderColor = 'var(--surface-border)'; e.target.style.color = 'var(--text-color-muted)'; }}
                >
                  <SvgIcon d="M12 4v16m8-8H4" size={14} /> Добавить
                </button>
              </div>
            </div>
          );
        })}
      </div>
      {selectedDeal && <DealModal deal={selectedDeal} stageName={selectedStage.name} stageColor={selectedStage.color} onClose={() => setSelectedDeal(null)} />}
    </div>
  );
}

  const toggleDone = (id) => setTasks(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));

  // Calendar logic — show current month
  const today = new Date(2026, 3, 22); // April 22, 2026
  const [calMonth, setCalMonth] = React.useState(today.getMonth());
  const [calYear, setCalYear] = React.useState(today.getFullYear());
  const monthNames = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const dayNames = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth + 1, 0);
  const startOffset = (firstDay.getDay() + 6) % 7;
  const daysInMonth = lastDay.getDate();
  // Map tasks to dates synthetically
  const taskDateMap = {};
  tasks.forEach(t => {
    let day;
    if (t.cat === 'overdue') day = 18 + (t.id % 3);
    else if (t.cat === 'today') day = 22;
    else if (t.cat === 'tomorrow') day = 23;
    else day = 24 + (t.id % 5);
    if (!taskDateMap[day]) taskDateMap[day] = [];
    taskDateMap[day].push(t);
  });

  return (
    <div className="animate-fade">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24, flexWrap:'wrap', gap:12 }}>

                <div style={taskStyles.checkbox(t.done)} onClick={() => toggleDone(t.id)}>
                  {t.done && '✓'}
                </div>
                <div style={taskStyles.taskText(t.done)}>{t.text}</div>
                <div style={taskStyles.taskMeta}>
                  {t.deal && <span style={taskStyles.dealTag}>{t.deal}</span>}
                  <span style={taskStyles.priorityTag(t.priority)}>
                    {t.priority === 'high' ? 'Высокий' : t.priority === 'medium' ? 'Средний' : 'Низкий'}
                  </span>
                  <div style={taskStyles.miniAvatar}>{t.assignee}</div>
                </div>
                <span style={taskStyles.timeTag(t.cat === 'overdue')}>{t.time}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      )}
    </div>
  );
}

          <div style={{display:'grid',gridTemplateColumns:'56px 2fr 1fr 0.8fr 0.6fr 0.6fr 0.8fr',padding:'12px 20px',borderBottom:'1px solid var(--surface-border)',fontSize:12,fontWeight:600,color:'var(--text-color-muted)',textTransform:'uppercase',letterSpacing:'0.05em'}}>
            <span></span><span>Компания</span><span>Отрасль</span><span>Город</span><span>Контакты</span><span>Сделки</span><span>Выручка</span>
          </div>
          {filtered.map(c=>(
            <div key={c.id} onMouseEnter={()=>setHovered(c.id)} onMouseLeave={()=>setHovered(null)} style={{display:'grid',gridTemplateColumns:'56px 2fr 1fr 0.8fr 0.6fr 0.6fr 0.8fr',padding:'12px 20px',borderBottom:'1px solid var(--surface-border)',fontSize:13,alignItems:'center',background:hovered===c.id?'var(--surface-hover)':'transparent',cursor:'pointer'}}>
              <div style={{width:38,height:38,borderRadius:10,background:c.color,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700}}>{c.logo}</div>
              <span style={{fontWeight:600}}>{c.name}</span>
              <span style={{color:'var(--text-color-secondary)'}}>{c.industry}</span>
              <span style={{color:'var(--text-color-muted)'}}>{c.city}</span>
              <span style={{fontWeight:600}}>{c.contacts}</span>
              <span style={{fontWeight:600}}>{c.deals}</span>
              <span style={{fontWeight:700,color:'var(--primary)'}}>{c.revenue}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function CreateModal({ kind, onClose }) {
  const cfg = createConfig[kind];
  const [values, setValues] = React.useState({});
  const [hover, setHover] = React.useState(false);
  if (!cfg) return null;
  const set = (id, v) => setValues(p => ({ ...p, [id]: v }));
  const inputBase = {
    width: '100%', padding: '9px 12px', borderRadius: 7,
    border: '1px solid var(--surface-border)', background: 'var(--surface-card)',
    color: 'var(--text-color)', fontSize: 13, fontFamily: 'inherit', outline: 'none',
    transition: 'border-color 0.15s',
  };
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:560,maxHeight:'90vh',background:'var(--surface-card)',borderRadius:'var(--radius-lg)',boxShadow:'0 20px 60px rgba(0,0,0,0.3)',display:'flex',flexDirection:'column',animation:'slideInRight 0.2s ease'}}>
        <div style={{display:'flex',alignItems:'center',gap:14,padding:'20px 24px',borderBottom:'1px solid var(--surface-border)'}}>
          <div style={{width:40,height:40,borderRadius:10,background:'var(--primary-lighter)',color:'var(--primary)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <SvgIcon d={cfg.icon} size={20}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:17,fontWeight:700}}>{cfg.title}</div>
            <div style={{fontSize:12,color:'var(--text-color-muted)',marginTop:2}}>Заполните основные поля</div>
          </div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:8,border:'none',background:'var(--surface-hover)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-color-secondary)'}}>
            <SvgIcon d="M6 18L18 6M6 6l12 12" size={16}/>
          </button>
        </div>
        <div style={{padding:'20px 24px',overflowY:'auto',display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          {cfg.fields.map(f => {
            const v = values[f.id] || '';
            const wrap = { gridColumn: f.full ? '1 / -1' : 'auto' };
            return (
              <div key={f.id} style={wrap}>
                <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--text-color-muted)',textTransform:'uppercase',letterSpacing:0.3,marginBottom:6}}>
                  {f.label}{f.required && <span style={{color:'var(--red-500)',marginLeft:3}}>*</span>}
                </label>
                {f.type === 'textarea' ? (
                  <textarea value={v} onChange={e=>set(f.id, e.target.value)} placeholder={f.placeholder} style={{...inputBase, minHeight:72, resize:'vertical', fontFamily:'inherit'}}/>
                ) : f.type === 'select' ? (
                  <select value={v} onChange={e=>set(f.id, e.target.value)} style={{...inputBase, cursor:'pointer'}}>
                    <option value="">— выбрать —</option>
                    {f.options.map(o => <option key={o} value={o}>{o}</option>)}
                  </select>
                ) : f.type === 'radio' ? (
                  <div style={{display:'flex',gap:6}}>
                    {f.options.map(o => {
                      const sel = v === o;
                      const colorMap = { 'Низкий':'var(--blue-500)', 'Средний':'var(--orange-500)', 'Высокий':'var(--red-500)' };
                      const c = colorMap[o] || 'var(--primary)';
                      return (
                        <button key={o} type="button" onClick={()=>set(f.id, o)} style={{flex:1,padding:'9px 6px',borderRadius:7,border:'1px solid '+(sel?c:'var(--surface-border)'),background:sel?c+'18':'transparent',color:sel?c:'var(--text-color-secondary)',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>{o}</button>
                      );
                    })}
                  </div>
                ) : f.type === 'tags' ? (
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {f.options.map(o => {
                      const arr = values[f.id] || [];
                      const sel = arr.includes(o);
                      return (
                        <button key={o} type="button" onClick={()=>set(f.id, sel ? arr.filter(x=>x!==o) : [...arr, o])} style={{padding:'5px 12px',borderRadius:20,border:'1px solid '+(sel?'var(--primary)':'var(--surface-border)'),background:sel?'var(--primary-lighter)':'transparent',color:sel?'var(--primary)':'var(--text-color-secondary)',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>{o}</button>
                      );
                    })}
                  </div>
                ) : (
                  <input type={f.type} value={v} onChange={e=>set(f.id, e.target.value)} placeholder={f.placeholder} style={inputBase} onFocus={e=>e.target.style.borderColor='var(--primary)'} onBlur={e=>e.target.style.borderColor='var(--surface-border)'}/>
                )}
              </div>
            );
          })}
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',padding:'16px 24px',borderTop:'1px solid var(--surface-border)',background:'var(--surface-ground)',borderRadius:'0 0 var(--radius-lg) var(--radius-lg)'}}>
          <button onClick={onClose} style={{padding:'9px 18px',borderRadius:8,border:'1px solid var(--surface-border)',background:'var(--surface-card)',color:'var(--text-color-secondary)',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>Отмена</button>
          <button onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} onClick={onClose} style={{padding:'9px 22px',borderRadius:8,border:'none',background:hover?'var(--primary-dark, var(--primary))':'var(--primary)',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:6,boxShadow:'0 2px 8px rgba(99,102,241,0.25)'}}>
            <SvgIcon d="M5 13l4 4L19 7" size={14}/>Создать
          </button>
        </div>
      </div>
    </div>
  );
}

window.CreateModal = CreateModal;


function App() {
  const [page, setPage] = React.useState(() => localStorage.getItem('crm_page') || 'dashboard');
  const [selectedContact, setSelectedContact] = React.useState(null);
  const [createKind, setCreateKind] = React.useState(null);
  const [quickAddOpen, setQuickAddOpen] = React.useState(false);
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = React.useState(false);
  const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);

  React.useEffect(() => { setMobileMenuOpen(false); }, [page]);

  // expose globally so screens can trigger create
  React.useEffect(() => { window.openCreate = (k) => setCreateKind(k); return () => { delete window.openCreate; }; }, []);

  React.useEffect(() => { localStorage.setItem('crm_page', page); }, [page]);

  // Apply primary color dynamically
  React.useEffect(() => {
    document.documentElement.style.setProperty('--primary', tweaks.primaryColor);
    const hex = tweaks.primaryColor;
    document.documentElement.style.setProperty('--primary-lighter', hex + '1A');
    document.documentElement.style.setProperty('--radius-md', tweaks.cardRadius + 'px');
    document.documentElement.setAttribute('data-theme', tweaks.theme || 'light');
  }, [tweaks]);

  // Tweaks protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (key, value) => {
    const next = { ...tweaks, [key]: value };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
  };

  const mainStyle = {
    marginLeft: 'var(--sidebar-width)',
    marginTop: 'var(--topbar-height)',
    padding: tweaks.density === 'compact' ? '16px 20px' : '24px 28px',
    minHeight: 'calc(100vh - var(--topbar-height))',
    transition: 'padding 0.2s',
  };

  return (
    <>
      <Sidebar currentPage={page} onNavigate={setPage} mobileOpen={mobileMenuOpen} onClose={() => setMobileMenuOpen(false)} />
      {mobileMenuOpen && <div className="mobile-overlay" onClick={() => setMobileMenuOpen(false)} />}
      <Topbar currentPage={page} onMenuClick={() => setMobileMenuOpen(true)} onQuickAdd={() => setQuickAddOpen(v=>!v)} quickAddOpen={quickAddOpen} onCloseQuickAdd={()=>setQuickAddOpen(false)} onPickCreate={(k)=>{setCreateKind(k);setQuickAddOpen(false);}} />
      <main className="crm-main" style={mainStyle}>
        {page === 'dashboard' && <DashboardScreen />}
        {page === 'contacts' && <ContactsScreen onOpenContact={setSelectedContact} />}
        {page === 'companies' && <CompaniesScreen />}
        {page === 'deals' && <DealsScreen />}
        {page === 'tasks' && <TasksScreen />}
        {page === 'chat' && <ChatScreen />}
        {page === 'email' && <EmailScreen />}
        {page === 'finance' && <FinanceScreen />}
        {page === 'reports' && <ReportsScreen />}
        {page === 'phone' && <PhoneScreen />}
        {page === 'settings' && <SettingsScreen />}
      </main>

      {selectedContact && <ContactModal contact={selectedContact} onClose={() => setSelectedContact(null)} />}
      {createKind && <CreateModal kind={createKind} onClose={() => setCreateKind(null)} />}

      {tweaksVisible && (
        <div style={{
          position: 'fixed', bottom: 16, right: 16, zIndex: 2000,
          width: 280, background: 'var(--surface-card)', borderRadius: 12,
          boxShadow: '0 8px 32px rgba(0,0,0,0.16)', border: '1px solid var(--surface-border)',
          animation: 'scaleIn 0.2s ease',
        }}>
          <div style={{ padding: '14px 18px', borderBottom: '1px solid var(--surface-border)', fontWeight: 700, fontSize: 14 }}>
            Tweaks
          </div>
          <div style={{ padding: '14px 18px', display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div>
              <label style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-color-secondary)', display: 'block', marginBottom: 6 }}>Основной цвет</label>
              <div style={{ display: 'flex', gap: 6 }}>
                {['#4F46E5', '#0891B2', '#059669', '#DC2626', '#7C3AED', '#D97706'].map(c => (
                  <div key={c} onClick={() => updateTweak('primaryColor', c)} style={{
                    width: 28, height: 28, borderRadius: 8, background: c, cursor: 'pointer',
                    border: tweaks.primaryColor === c ? '3px solid var(--text-color)' : '3px solid transparent',
                    transition: 'border 0.15s',
                  }} />
                ))}
              </div>
            </div>
            <div>
              <label style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-color-secondary)', display: 'block', marginBottom: 6 }}>Скругление карточек</label>
              <input type="range" min="0" max="20" value={tweaks.cardRadius}
                onChange={e => updateTweak('cardRadius', Number(e.target.value))}
                style={{ width: '100%' }} />
              <div style={{ fontSize: 11, color: 'var(--text-color-muted)', textAlign: 'right' }}>{tweaks.cardRadius}px</div>
            </div>
            <div>
              <label style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-color-secondary)', display: 'block', marginBottom: 6 }}>Тема</label>
              <div style={{ display: 'flex', gap: 6 }}>
                {[['light', 'Светлая'], ['dark', 'Тёмная']].map(([t, label]) => (
                  <button key={t} onClick={() => updateTweak('theme', t)} style={{
                    flex: 1, padding: '6px 0', borderRadius: 6, fontSize: 12, fontWeight: 600,
                    border: '1px solid ' + ((tweaks.theme || 'light') === t ? 'var(--primary)' : 'var(--surface-border)'),
                    background: (tweaks.theme || 'light') === t ? 'var(--primary-lighter)' : 'var(--surface-card)',
                    color: (tweaks.theme || 'light') === t ? 'var(--primary)' : 'var(--text-color-secondary)',
                    cursor: 'pointer', fontFamily: 'inherit',
                  }}>{label}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-color-secondary)', display: 'block', marginBottom: 6 }}>Плотность</label>
              <div style={{ display: 'flex', gap: 6 }}>
                {['compact', 'comfortable'].map(d => (
                  <button key={d} onClick={() => updateTweak('density', d)} style={{
                    flex: 1, padding: '6px 0', borderRadius: 6, fontSize: 12, fontWeight: 600,
                    border: '1px solid ' + (tweaks.density === d ? 'var(--primary)' : 'var(--surface-border)'),
                    background: tweaks.density === d ? 'var(--primary-lighter)' : '#fff',
                    color: tweaks.density === d ? 'var(--primary)' : 'var(--text-color-secondary)',
                    cursor: 'pointer', fontFamily: 'inherit',
                  }}>
                    {d === 'compact' ? 'Компакт' : 'Комфорт'}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>

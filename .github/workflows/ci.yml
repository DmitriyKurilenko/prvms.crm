name: CI/CD

# CI runs on every PR and every push to main.
# CD (deploy job) runs only on push to main, after CI is green, and is
# guarded by concurrency:production-deploy so two deploys never overlap.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  backend:
    name: Backend — Django check + migrations guard + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://ci:ci_password@localhost:5432/ci_test
      REDIS_URL: redis://localhost:6379/0
      # Dummy values — no real secrets in CI. Production uses GitHub
      # secrets injected via deploy step on the VPS, not here.
      SECRET_KEY: ci-secret-key-not-for-production-use-only
      FIELD_ENCRYPTION_KEY: Y2ktZmllbGQtZW5jcnlwdGlvbi1rZXktMzJieXRlcw==
      SALT_KEY: Y2ktc2FsdC1rZXktMzJieXRlcy1mb3ItY2ktcnVu
      REDIS_PASSWORD: ""
      DEBUG: "False"
      ALLOWED_HOSTS: "*"
      SHOW_PUBLIC_IF_NO_TENANT_FOUND: "True"
      PLATFORM_DOMAIN: localhost
      PLATFORM_PROTOCOL: http
      FRONTEND_APP_URL: http://localhost
      CSRF_TRUSTED_ORIGINS: http://localhost
      CORS_ALLOWED_ORIGINS: http://localhost

    steps:
      - uses: actions/checkout@v4

      - name: System deps (WeasyPrint + psycopg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpq-dev \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libcairo2 \
            libffi-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Latent-migrations guard (--check)
        # Catches the class of debt that hit us in 0.2.3 — model code
        # changes without a corresponding makemigrations. Fails the
        # build if `manage.py makemigrations --check` would generate
        # any new migration file.
        run: python manage.py makemigrations --check --dry-run

      - name: Tests
        run: python manage.py test apps --noinput --verbosity 1

  frontend:
    name: Frontend — typecheck + tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: TypeScript
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm run test

      - name: Production build
        run: npm run build
        env:
          # Build-time injection — same value the prod compose passes.
          # Verifies the bundle compiles with the prod API origin.
          VITE_API_URL: https://crm.prvms.ru/api

  deploy:
    name: Deploy to production VPS
    needs: [backend, frontend]
    # Only on direct push to main (not PRs, not forks). Fork PRs cannot
    # access secrets, so this guard is belt-and-suspenders.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # GitHub Environment — set protection rules here if a manual approval
    # gate is desired later. Currently configured as continuous-deploy.
    environment:
      name: production
      url: https://crm.prvms.ru

    # production-deploy is a project-wide singleton: never two parallel
    # deploys. Don't cancel a deploy mid-flight if a newer commit lands;
    # let the current one finish, then the next one will run.
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Prepare SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          if [ -z "${SSH_HOST}" ] || [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "::error::SSH_HOST or SSH_PRIVATE_KEY secret is missing. See .github/SECRETS.md."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${SSH_PORT}" -H "${SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_deploy \
              -o StrictHostKeyChecking=yes \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=20 \
              -p "${SSH_PORT}" \
              "root@${SSH_HOST}" \
              "DEPLOY_SHA=${DEPLOY_SHA} bash -s" <<'REMOTE'
          set -Eeuo pipefail
          echo "[$(date -Is)] Deploy started for ${DEPLOY_SHA}"

          cd /opt/crm_prvms

          # CI is the source of truth for what main looks like. Reset
          # hard against origin/main so local mutations on the server
          # never silently survive (the env file is gitignored and
          # untracked, so it is preserved by reset).
          git fetch --all --prune --quiet
          git reset --hard "${DEPLOY_SHA}"

          # deploy.sh runs ensure_root_layout (symlink self-heal),
          # builds, migrates, force-recreates containers, restarts
          # Traefik. --no-pull because CI already moved HEAD.
          ./vps-deployment/crm_prvms/deploy.sh --no-pull

          echo "[$(date -Is)] Deploy finished"
          REMOTE

      - name: Smoke test — /healthz must return 200
        run: |
          for i in $(seq 1 12); do
            code=$(curl -sk -o /dev/null -w '%{http_code}' https://crm.prvms.ru/healthz || true)
            if [ "${code}" = "200" ]; then
              echo "✓ /healthz returned 200 (attempt ${i})"
              exit 0
            fi
            echo "Attempt ${i}: /healthz returned '${code}', retrying in 10s..."
            sleep 10
          done
          echo "::error::/healthz did not return 200 after 120s"
          curl -skI https://crm.prvms.ru/healthz | head -10 || true
          exit 1

      - name: Smoke test — homepage must return 200 (SPA)
        run: |
          code=$(curl -sk -o /dev/null -w '%{http_code}' https://crm.prvms.ru/ || true)
          if [ "${code}" = "200" ]; then
            echo "✓ homepage returned 200"
          else
            echo "::warning::homepage returned '${code}' (expected 200). Site may still be coming up — check manually."
            curl -skI https://crm.prvms.ru/ | head -5 || true
          fi

server {
    listen 80;
    server_name _;

    # Django collected static lives in a shared volume mounted into this container
    # at /usr/share/nginx/django-static. It serves /static/ for both the SPA and
    # Django Admin assets so the API container does not need to ship its own
    # static-file server.
    location /static/ {
        alias /usr/share/nginx/django-static/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # SPA assets bundled at build time.
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed Vite build assets.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Production stack for prvms.crm — DO NOT run directly.
# Use: ./deploy.sh (it builds images, runs migrations and brings containers up in the correct order).
#
# Routing is handled by the shared Traefik reverse proxy (external network "traefik").
# Ports 80/443 are NOT exposed on the host.

services:
  db:
    image: postgres:17
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    environment:
      - POSTGRES_DB=${DB_NAME:-platform_db}
      - POSTGRES_USER=${DB_USER:-platform}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    expose:
      - "5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-platform} -d ${DB_NAME:-platform_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    expose:
      - "6379"
    networks:
      - backend
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: prvms-crm-web:latest
    restart: "no"
    command: >
      sh -c "python manage.py migrate_schemas --shared --noinput &&
             python manage.py migrate_schemas --tenant --noinput"
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  web:
    image: prvms-crm-web:latest
    build: .
    restart: always
    command: >
      gunicorn config.asgi:application
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --workers 2
      --timeout 120
      --max-requests 1000
      --max-requests-jitter 100
      --access-logfile -
      --error-logfile -
    expose:
      - "8000"
    volumes:
      - static_volume:/app/staticfiles
      - ./logs:/app/logs
    networks:
      - backend
      - traefik
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.prvms-api.rule=Host(`${TRAEFIK_HOST}`) && (PathPrefix(`/api`) || PathPrefix(`/ws`) || PathPrefix(`/admin`) || PathPrefix(`/sign`) || PathPrefix(`/wh`) || PathPrefix(`/channels/webhook`) || PathPrefix(`/billing`) || PathPrefix(`/telephony`) || Path(`/healthz`))"
      - "traefik.http.routers.prvms-api.entrypoints=websecure"
      - "traefik.http.routers.prvms-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.prvms-api.priority=100"
      - "traefik.http.services.prvms-api.loadbalancer.server.port=8000"

  celery:
    image: prvms-crm-web:latest
    restart: always
    command: celery -A config worker -l info --concurrency=2 --max-tasks-per-child=50
    volumes:
      - ./logs:/app/logs
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    healthcheck:
      disable: true

  celery-beat:
    image: prvms-crm-web:latest
    restart: always
    command: celery -A config beat -l info
    volumes:
      - ./logs:/app/logs
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    healthcheck:
      disable: true

  frontend-app:
    image: prvms-crm-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: https://${TRAEFIK_HOST}/api
    restart: always
    expose:
      - "80"
    volumes:
      - static_volume:/usr/share/nginx/django-static:ro
    networks:
      - traefik
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.prvms-static.rule=Host(`${TRAEFIK_HOST}`) && PathPrefix(`/static`)"
      - "traefik.http.routers.prvms-static.entrypoints=websecure"
      - "traefik.http.routers.prvms-static.tls.certresolver=letsencrypt"
      - "traefik.http.routers.prvms-static.priority=50"
      - "traefik.http.routers.prvms-static.service=prvms-frontend"
      - "traefik.http.routers.prvms-spa.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.prvms-spa.entrypoints=websecure"
      - "traefik.http.routers.prvms-spa.tls.certresolver=letsencrypt"
      - "traefik.http.routers.prvms-spa.priority=1"
      - "traefik.http.routers.prvms-spa.service=prvms-frontend"
      - "traefik.http.services.prvms-frontend.loadbalancer.server.port=80"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local

networks:
  backend:
    driver: bridge
    internal: true
  traefik:
    external: true
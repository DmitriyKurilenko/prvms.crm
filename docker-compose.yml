services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: platform_db
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_HOST_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  web:
    build: .
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "${WEB_HOST_PORT:-18100}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: node:24-alpine
    working_dir: /srv/app
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port ${FRONTEND_DEV_HOST_PORT:-15173}"
    volumes:
      - ./frontend:/srv/app
      - ./docs/user-guide:/srv/app/src/docs/user-guide:ro
      - frontend_node_modules:/srv/app/node_modules
    ports:
      - "${FRONTEND_DEV_HOST_PORT:-15173}:${FRONTEND_DEV_HOST_PORT:-15173}"
    environment:
      - VITE_API_URL=http://localhost:${WEB_HOST_PORT:-18100}/api

  frontend-prod:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    profiles:
      - frontend-prod
    ports:
      - "${FRONTEND_PROD_HOST_PORT:-14173}:80"
    restart: unless-stopped

  celery:
    build: .
    command: celery -A config worker -l info
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A config beat -l info --schedule /tmp/celerybeat-schedule
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    restart: unless-stopped

  migrate:
    build: .
    command: >
      sh -c "echo '=== Starting migration' &&
             python manage.py migrate_schemas --shared --noinput &&
             python manage.py migrate_schemas --tenant --noinput"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  hermes-init:
    image: alpine:3.20
    command: sh /config/init.sh
    volumes:
      - hermes_profiles:/opt/data
      - ./config/hermes/init.sh:/config/init.sh:ro
      - ./config/hermes/config.yaml:/config/config.yaml:ro
      - ./apps/ai_assistant/hermes_skills:/crm-skills:ro

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: prvmscrm-hermes
    command: gateway run
    volumes:
      - hermes_profiles:/opt/data
    ports:
      - "${HERMES_API_PORT:-18642}:8642"
    env_file:
      - .env
    environment:
      - TZ=${TZ:-Europe/Moscow}
      - HERMES_HOME=/opt/data
      - API_SERVER_ENABLED=true
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${HERMES_API_KEY:-change-me}
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_MODEL_NAME=${HERMES_MODEL:-hermes-agent}
      - OPENCODE_GO_API_KEY=${OPENCODE_GO_API_KEY:-${OPENCODE_API_KEY:-}}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - HERMES_MULTIUSER=true
      - GATEWAY_ALLOW_ALL_USERS=true
    depends_on:
      hermes-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # --- Dev-tools (профиль "tools": не поднимаются обычным `up`) ---

  lint:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - .:/app
    command: ruff check .
    profiles: ["tools"]

  # Одноразовый сид детерминированных данных для e2e (идемпотентен, требует DEBUG).
  seed:
    build: .
    command: python manage.py seed_demo_users --count 1
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    profiles: ["tools"]

  e2e:
    image: mcr.microsoft.com/playwright:v1.61.0-jammy
    working_dir: /srv/app
    command: sh -c "npm install --no-audit --no-fund && npx playwright test"
    volumes:
      - ./frontend:/srv/app
      - e2e_node_modules:/srv/app/node_modules
    environment:
      # Same-origin: SPA зовёт относительный /api, а vite preview проксирует его
      # на web:8000 внутри compose-сети. Так нет CORS и проблем с SameSite-cookie.
      - VITE_API_URL=/api
      - E2E_API_PROXY=http://web:8000
      - E2E_BASE_URL=http://127.0.0.1:4173
      - CI=1
    depends_on:
      # `docker compose run --rm e2e` сам поднимает web и прогоняет seed —
      # предусловие данных не требует ручных шагов.
      web:
        condition: service_started
      seed:
        condition: service_completed_successfully
    profiles: ["tools"]

volumes:
  pgdata:
  frontend_node_modules:
  hermes_profiles:
  e2e_node_modules:

services:
  db:
    image: mariadb:11.4
    restart: always
    command:
      - "--innodb-buffer-pool-size=64M"
      - "--innodb-log-buffer-size=8M"
      - "--max-connections=80"
      - "--performance-schema=OFF"
      - "--tmp_table_size=16M"
      - "--max_heap_table_size=16M"
      - "--innodb-flush-method=fsync"
    expose:
      - "3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bookstack}
      MYSQL_USER: ${MYSQL_USER:-bookstack}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - /opt/backups:/backups
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M
    mem_limit: 384m
    mem_reservation: 128m

  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    restart: always
    expose:
      - "80"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-UTC}
      - APP_URL=https://${BOOKSTACK_DOMAIN:-docs.kapitan-trips.ru}
      - APP_KEY=${BOOKSTACK_APP_KEY:-}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USERNAME=${MYSQL_USER:-bookstack}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_DATABASE=${MYSQL_DATABASE:-bookstack}
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-Bookstack}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
    volumes:
      - bookstack_data:/config
    networks:
      - backend
      - proxy
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bookstack.rule=Host(`${BOOKSTACK_DOMAIN:-docs.kapitan-trips.ru}`)"
      - "traefik.http.routers.bookstack.entrypoints=websecure"
      - "traefik.http.routers.bookstack.tls.certresolver=le"
      - "traefik.http.services.bookstack.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M
    mem_limit: 384m
    mem_reservation: 128m

volumes:
  mysql_data:
    driver: local
  bookstack_data:
    driver: local

networks:
  backend:
    driver: bridge
    internal: true
  proxy:
    external: true
    name: proxy

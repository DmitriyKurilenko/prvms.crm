services:
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /opt/backups:/backups
    environment:
      - POSTGRES_DB=${DB_NAME:-boat_rental}
      - POSTGRES_USER=${DB_USER:-boat_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    expose:
      - "5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-boat_user} -d ${DB_NAME:-boat_rental}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
        reservations:
          cpus: '0.05'
          memory: 96M

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000
    expose:
      - "6379"
    networks:
      - backend
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 192M
        reservations:
          cpus: '0.02'
          memory: 32M

  web:
    build:
      context: /opt/rent_django
      dockerfile: Dockerfile
    image: rent_django-web
    restart: always
    command: gunicorn boat_rental.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 120 --max-requests 1000 --max-requests-jitter 100 --access-logfile - --error-logfile -
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
      - /opt/rent_django/logs:/app/logs
    expose:
      - "8000"
    networks:
      - backend
      - proxy
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${DB_USER:-boat_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-boat_rental}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-arenda.kapitan-trips.ru}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_REGION=${S3_REGION}
      - SECURE_SSL_REDIRECT=True
      - SESSION_COOKIE_SECURE=True
      - CSRF_COOKIE_SECURE=True
      - SECURE_HSTS_SECONDS=31536000
      - REDIS_CACHE_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rent_django.rule=Host(`arenda.kapitan-trips.ru`)"
      - "traefik.http.routers.rent_django.entrypoints=websecure"
      - "traefik.http.routers.rent_django.tls.certresolver=le"
      - "traefik.http.services.rent_django.loadbalancer.server.port=8000"
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
        reservations:
          cpus: '0.05'
          memory: 96M

  celery_worker:
    build:
      context: /opt/rent_django
      dockerfile: Dockerfile
    image: rent_django-web
    restart: always
    command: celery -A boat_rental worker -l info --concurrency=1 --max-tasks-per-child=20
    volumes:
      - media_volume:/app/mediafiles
      - /opt/rent_django/logs:/app/logs
    networks:
      - backend
      - proxy
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${DB_USER:-boat_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-boat_rental}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_REGION=${S3_REGION}
    depends_on:
      - db
      - redis
      - web
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M

  celery_beat:
    build:
      context: /opt/rent_django
      dockerfile: Dockerfile
    image: rent_django-web
    restart: always
    command: celery -A boat_rental beat -l info
    volumes:
      - /opt/rent_django/logs:/app/logs
    networks:
      - backend
      - proxy
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${DB_USER:-boat_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-boat_rental}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - db
      - redis
      - web
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 96M
        reservations:
          cpus: '0.02'
          memory: 32M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  backend:
    driver: bridge
    internal: true
  proxy:
    external: true
    name: proxy

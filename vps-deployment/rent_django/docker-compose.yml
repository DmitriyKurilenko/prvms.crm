services:
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /opt/backups:/backups
    environment:
      - POSTGRES_DB=${DB_NAME:-boat_rental}
      - POSTGRES_USER=${DB_USER:-boat_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    expose:
      - "5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-boat_user} -d ${DB_NAME:-boat_rental}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
        reservations:
          cpus: '0.05'
          memory: 96M

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000
    expose:
      - "6379"
    networks:
      - backend
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 192M
        reservations:
          cpus: '0.02'
          memory: 32M

  web:
    build:
      context: /opt/rent_django
      dockerfile: Dockerfile
    image: rent_django-web
    restart: always
    command: gunicorn boat_rental.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 120 --max-requests 1000 --max-requests-jitter 100 --access-logfile - --error-logfile -
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
      - /opt/rent_django/logs:/app/logs
    expose:
      - "8000"
    networks:
      - backend
      - proxy
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${DB_USER:-boat_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-boat_rental}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-arenda.kapitan-trips.ru}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_REGION=${S3_REGION}
      - SECURE_SSL_REDIRECT=True
      - SESSION_COOKIE_SECURE=True
      - CSRF_COOKIE_SECURE=True
      - SECURE_HSTS_SECONDS=31536000
      - REDIS_CACHE_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
    # Disable healthcheck (image-level HEALTHCHECK from Dockerfile probes
    # http://localhost:8000/health/, which Django rejects with 400 DisallowedHost
    # because ALLOWED_HOSTS does not include `localhost`. That keeps the container
    # in `unhealthy` / `starting` indefinitely, and Traefik filters its routers —
    # exactly the trap that hid the crm_prvms HTTPS issue in 0.2.1/0.2.2.)
    # `disable: true` explicitly overrides the image-level directive; merely
    # omitting the block falls back to the image's broken probe.
    # Gunicorn is reliable; Docker restart policy handles the rare hang. Traefik
    # treats no-healthcheck containers as healthy and registers routers immediately.
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # web handles every path EXCEPT /static and /media (those are served by
      # the static_files nginx container at higher priority — Traefik picks
      # the highest-priority matching router).
      - "traefik.http.routers.rent_django.rule=Host(`arenda.kapitan-trips.ru`)"
      - "traefik.http.routers.rent_django.entrypoints=websecure"
      - "traefik.http.routers.rent_django.tls=true"
      - "traefik.http.routers.rent_django.tls.certresolver=le"
      - "traefik.http.routers.rent_django.priority=1"
      - "traefik.http.routers.rent_django.service=rent_django"
      - "traefik.http.services.rent_django.loadbalancer.server.port=8000"
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
        reservations:
          cpus: '0.05'
          memory: 96M

  celery_worker:
    build:
      context: /opt/rent_django
      dockerfile: Dockerfile
    image: rent_django-web
    restart: always
    command: celery -A boat_rental worker -l info --concurrency=1 --max-tasks-per-child=20
    # Celery workers share the rent_django-web image, which carries a Dockerfile
    # HEALTHCHECK probing port 8000 — celery does not listen there, so the probe
    # always fails. Explicitly disable.
    healthcheck:
      disable: true
    volumes:
      - media_volume:/app/mediafiles
      - /opt/rent_django/logs:/app/logs
    networks:
      - backend
      - proxy
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${DB_USER:-boat_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-boat_rental}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_REGION=${S3_REGION}
    depends_on:
      - db
      - redis
      - web
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M

  celery_beat:
    build:
      context: /opt/rent_django
      dockerfile: Dockerfile
    image: rent_django-web
    restart: always
    command: celery -A boat_rental beat -l info
    # Same image as web, same baked-in HEALTHCHECK probing port 8000 — disable.
    healthcheck:
      disable: true
    volumes:
      - /opt/rent_django/logs:/app/logs
    networks:
      - backend
      - proxy
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${DB_USER:-boat_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-boat_rental}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - db
      - redis
      - web
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 96M
        reservations:
          cpus: '0.02'
          memory: 32M

  # nginx that serves Django collected static + uploaded media. Gunicorn does
  # not serve static files in production, so without this container any /static/*
  # or /media/* URL would 404. Shares the same static_volume/media_volume that
  # `web` populates via `collectstatic` and Django's storage backend.
  static_files:
    image: nginx:1.27-alpine
    restart: always
    expose:
      - "80"
    volumes:
      - static_volume:/usr/share/nginx/html/static:ro
      - media_volume:/usr/share/nginx/html/media:ro
    networks:
      - proxy
    depends_on:
      - web
    # No healthcheck on purpose (see web service comment for rationale).
    healthcheck:
      disable: true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.rent_django_static.rule=Host(`arenda.kapitan-trips.ru`) && (PathPrefix(`/static`) || PathPrefix(`/media`))"
      - "traefik.http.routers.rent_django_static.entrypoints=websecure"
      - "traefik.http.routers.rent_django_static.tls=true"
      - "traefik.http.routers.rent_django_static.tls.certresolver=le"
      - "traefik.http.routers.rent_django_static.priority=50"
      - "traefik.http.routers.rent_django_static.service=rent_django_static"
      - "traefik.http.services.rent_django_static.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          cpus: '0.02'
          memory: 16M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  backend:
    driver: bridge
    internal: true
  proxy:
    external: true
    name: proxy

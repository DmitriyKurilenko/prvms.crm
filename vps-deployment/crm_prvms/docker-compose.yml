# prvms.crm — production stack for the shared Traefik+Portainer host.
#
# Layout assumed by this file:
#   /opt/crm_prvms/                  # git checkout of the project
#       docker-compose.yml           # symlink (or copy) of THIS file
#       .env.prod                    # secrets (NOT in git, copy from .env.prod.example)
#       logs/, media/                # bind-mounted runtime data (created on first run)
#
# Routing (Traefik):
#   /api, /ws, /admin, /sign, /channels/webhook, /telephony,
#   /billing/yookassa/webhook, /notifications/telegram, /healthz, /media
#       -> web   (priority 100)
#   /static
#       -> frontend-app (priority 50, serves Django static via shared volume)
#   everything else
#       -> frontend-app (priority 1, SPA fallback / index.html)

services:
  db:
    image: postgres:17
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /opt/backups/crm_prvms:/backups
    environment:
      - POSTGRES_DB=${DB_NAME:-platform_db}
      - POSTGRES_USER=${DB_USER:-platform}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    expose:
      - "5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-platform} -d ${DB_NAME:-platform_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    expose:
      - "6379"
    networks:
      - backend
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M

  # One-shot: apply public + tenant migrations and collect Django static for nginx.
  # Runs to completion before web/celery start (depends_on: service_completed_successfully).
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: prvms-crm-web:latest
    restart: "no"
    command: >
      sh -c "python manage.py migrate_schemas --shared --noinput &&
             python manage.py migrate_schemas --tenant --noinput &&
             python manage.py collectstatic --noinput"
    volumes:
      - static_volume:/app/staticfiles
      - ./media:/app/media
      - ./logs:/app/logs
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env.prod

  web:
    image: prvms-crm-web:latest
    restart: unless-stopped
    command: >
      gunicorn config.asgi:application
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --workers 2
      --timeout 120
      --max-requests 1000
      --max-requests-jitter 100
      --access-logfile -
      --error-logfile -
    expose:
      - "8000"
    volumes:
      - static_volume:/app/staticfiles
      - ./media:/app/media
      - ./logs:/app/logs
    networks:
      - backend
      - proxy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - ./.env.prod
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # API + admin + signing + webhooks + WebSockets — all served by Django.
      - "traefik.http.routers.crm-api.rule=Host(`${PUBLIC_HOSTNAME}`) && (PathPrefix(`/api`) || PathPrefix(`/ws`) || PathPrefix(`/admin`) || PathPrefix(`/sign`) || PathPrefix(`/channels/webhook`) || PathPrefix(`/telephony`) || PathPrefix(`/billing/yookassa/webhook`) || PathPrefix(`/notifications/telegram`) || PathPrefix(`/media`) || Path(`/healthz`))"
      - "traefik.http.routers.crm-api.entrypoints=websecure"
      - "traefik.http.routers.crm-api.tls=true"
      - "traefik.http.routers.crm-api.tls.certresolver=le"
      - "traefik.http.routers.crm-api.priority=100"
      - "traefik.http.routers.crm-api.service=crm-api"
      - "traefik.http.services.crm-api.loadbalancer.server.port=8000"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.2'
          memory: 256M

  celery:
    image: prvms-crm-web:latest
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=2 --max-tasks-per-child=50
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - ./.env.prod
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  celery-beat:
    image: prvms-crm-web:latest
    restart: unless-stopped
    command: celery -A config beat -l info
    volumes:
      - ./logs:/app/logs
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - ./.env.prod
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M

  frontend-app:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: https://${PUBLIC_HOSTNAME}/api
    image: prvms-crm-frontend:latest
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      # Reuse the same staticfiles volume that `migrate` populates via collectstatic;
      # nginx (frontend-app) will serve them at /static/.
      - static_volume:/usr/share/nginx/django-static:ro
    networks:
      - proxy
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Django Admin static files (highest priority among frontend routes).
      - "traefik.http.routers.crm-static.rule=Host(`${PUBLIC_HOSTNAME}`) && PathPrefix(`/static`)"
      - "traefik.http.routers.crm-static.entrypoints=websecure"
      - "traefik.http.routers.crm-static.tls=true"
      - "traefik.http.routers.crm-static.tls.certresolver=le"
      - "traefik.http.routers.crm-static.priority=50"
      - "traefik.http.routers.crm-static.service=crm-frontend"
      # SPA catch-all (lowest priority — anything not claimed by API/static goes to SPA).
      - "traefik.http.routers.crm-spa.rule=Host(`${PUBLIC_HOSTNAME}`)"
      - "traefik.http.routers.crm-spa.entrypoints=websecure"
      - "traefik.http.routers.crm-spa.tls=true"
      - "traefik.http.routers.crm-spa.tls.certresolver=le"
      - "traefik.http.routers.crm-spa.priority=1"
      - "traefik.http.routers.crm-spa.service=crm-frontend"
      - "traefik.http.services.crm-frontend.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M

  hermes:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    expose:
      - "8642"
    networks:
      - backend
    environment:
      - HERMES_API_KEY=${HERMES_API_KEY}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - OPENCODE_BASE_URL=${OPENCODE_BASE_URL:-https://api.opencode.ai}
    volumes:
      - hermes_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8642/healthz || exit 0"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  hermes_data:
    driver: local

networks:
  # Internal: db, redis, web, celery, hermes — no public egress needed by default.
  backend:
    driver: bridge
    internal: false
  # Shared with Traefik (created by /opt/scripts/init-server.sh).
  proxy:
    external: true
    name: proxy

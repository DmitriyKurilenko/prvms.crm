services:
  portainer:
    image: portainer/portainer-ce:2.20.3
    restart: always
    command: -H unix:///var/run/docker.sock

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

    networks:
      - proxy

    # Portainer exposed directly on https://VPS_IP:9443 — no Host route, no certificate.
    # If you ever want it on a real domain, add a DNS A record first, then uncomment:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.portainer.rule=Host(`portainer.example.com`)"
    #   - "traefik.http.routers.portainer.entrypoints=websecure"
    #   - "traefik.http.routers.portainer.tls.certresolver=le"
    #   - "traefik.http.services.portainer.loadbalancer.server.port=9000"

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  portainer_data:
    driver: local

networks:
  proxy:
    external: true
    name: proxy
